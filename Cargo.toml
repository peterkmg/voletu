[workspace]
resolver = "2"
members = [
  "packages/core",
  "packages/server",
  "packages/desktop"
]

[workspace.dependencies]
tokio = { version = "1", features = [ "full" ] }
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
axum = { version = "0.8", features = [
  "macros",
  "multipart"
] }
tower = "0.5"
tower-http = { version = "0.6", features = [
  "cors",
  "trace"
] }

utoipa = { version = "5", features = [
  "axum_extras",
  "chrono",
  "uuid"
] }
utoipa-axum = "0.2"
utoipa-swagger-ui = { version = "9", features = [
  "axum",
  "vendored"
] }

sea-orm = { version = "2.0.0-rc.34", features = [
  "sqlx-all",
  "with-uuid",
  "runtime-tokio-rustls",
  "macros",
  "schema-sync",
  "entity-registry",
] }

chrono = "0.4"
uuid = { version = "1.21", features = [
  "v7",
  "serde"
] }

tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"

anyhow = "1"
thiserror = "2"

tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = [
  "env-filter",
  "fmt"
] }

validator = { version = "0.20", features = [ "derive" ] }
axum-valid = { version = "0.24", features = [
  "validator",
  "typed_header",
  "typed_multipart",
] }
argon2 = "0.5"
axum-extra = { version = "0.12", features = [ "typed-header" ] }
jsonwebtoken = { version = "10", default-features = false, features = ["rust_crypto"] }

libsqlite3-sys = { version = "0.30.1", features = [ "bundled-sqlcipher-vendored-openssl", ] }

confy = "2"

dotenvy = "0.15"

keyring = { version = "3", features = [ "windows-native" ] }
rand = "0.10"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls"
] }
