[package]
name = "voletu-desktop"
version = "0.1.0"
description = "Voletu Desktop App"
authors = ["Petr Komogortsev <petr.komogortsev@gmail.com>"]
edition = "2021"

[lib]
name = "voletu_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
voletu-core = { path = "../core" }
tauri.workspace = true
tauri-plugin-opener.workspace = true
tracing.workspace = true
serde.workspace = true
confy.workspace = true
keyring-core.workspace = true
tokio.workspace = true
anyhow.workspace = true

[target.'cfg(windows)'.dependencies]
windows-native-keyring-store.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
dbus-secret-service-keyring-store.workspace = true
