<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voletu</title>
    <style>
      body {
        margin: 0;
        background: #fff;
      }
      #splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100svh;
        gap: 1.25rem;
        animation: fadeIn 0.3s ease-out;
      }
      #splash .letter {
        font-size: 2.5rem;
        font-weight: 700;
        color: #d4d4d8;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        animation: breathe 2s ease-in-out infinite;
      }
      #splash .spinner {
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid #e4e4e7;
        border-top-color: #a1a1aa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes breathe {
        0%,
        100% {
          color: #d4d4d8;
        }
        50% {
          color: #a1a1aa;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #root:not(:empty) ~ #splash {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="splash">
      <div class="letter">V</div>
      <div class="spinner"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
